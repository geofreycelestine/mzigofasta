<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - MzigoFasta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        header { background: #1a5f2a; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; }
        .btn-primary { background: #f5a623; color: #333; }
        .btn-secondary { background: #1a5f2a; color: white; }
        
        .load-card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .load-card h3 { color: #1a5f2a; margin-bottom: 0.5rem; }
        .load-card .route { color: #666; margin-bottom: 0.5rem; font-size: 1.1rem; }
        .load-card .details { color: #888; margin-bottom: 1rem; }
        .load-card .price { color: #f5a623; font-weight: bold; font-size: 1.3rem; margin-bottom: 1rem; }
        .status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; }
        .status-open { background: #e8f5e9; color: #1a5f2a; }
    </style>
</head>
<body>
    <header>
        <div>🚛 MzigoFasta - Driver Dashboard</div>
        <button class="btn btn-primary" onclick="logout()">Logout</button>
    </header>
    
    <div class="container">
        <h2 style="margin-bottom: 1rem;">Available Loads / Mizigo Inayopatikana</h2>
        <div id="availableLoads">
            <p style="text-align: center; color: #666; padding: 2rem;">Loading loads...</p>
        </div>
    </div>

    <script>
    const API_URL = 'https://mzigofasta.onrender.com';
git add .
git commit -m "Update API URL to Codespaces live URL"
git push origin main
        
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token || user.user_type !== 'driver') {
            window.location.href = '/index.html';
        }
        
        async function loadAvailableLoads() {
            try {
                const response = await fetch(`${API_URL}/api/loads`);
                const data = await response.json();
                
                const container = document.getElementById('availableLoads');
                
                if (data.loads.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #666; padding: 2rem;">No loads available right now. Check back soon!</p>';
                    return;
                }
                
                container.innerHTML = data.loads.map(load => `
                    <div class="load-card">
                        <h3>${load.title}</h3>
                        <div class="route">📍 ${load.pickup_location} → ${load.dropoff_location}</div>
                        <div class="details">
                            🏋️ ${load.weight_kg} kg | 🚛 ${load.truck_type_needed} | 📦 ${load.cargo_type}
                        </div>
                        <div class="price">💰 TSh ${load.price_offer.toLocaleString()}</div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="status status-open">${load.status}</span>
                            <span style="color: #666;">Shipper: ${load.shipper_name}</span>
                        </div>
                        <button class="btn btn-secondary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;" onclick="acceptLoad(${load.id})">
                            Accept Load / Kubali Mizigo
                        </button>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('availableLoads').innerHTML = 
                    '<p style="text-align: center; color: red; padding: 2rem;">Error loading loads. Please refresh.</p>';
            }
        }
        
        function acceptLoad(loadId) {
            alert('Load accepted! Feature coming soon: contact shipper at phone number.');
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/index.html';
        }
        
        loadAvailableLoads();
        setInterval(loadAvailableLoads, 30000);
    </script>
</body>
</html>
